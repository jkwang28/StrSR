name: Star History

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00 更新
  watch:
    types: [started]      # 有人 Star 后立即尝试更新
  workflow_dispatch:     # 支持手动运行

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: true

jobs:
  star-history:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          token: ${{ secrets.GH_PAT }}
          type: Date
          themes: light,dark
          output-dir: assets/star-history
          update-readme: true
